<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fffdf7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="只记一笔" />
    <title>只记一笔</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="todayLabel"></p>
          <h1>只记一笔</h1>
        </div>
        <button class="icon-button" id="exportJsonButton" type="button" aria-label="导出 JSON">
          <span>↓</span>
        </button>
      </header>

      <main>
        <section class="view is-active" id="homeView" aria-labelledby="homeTitle">
          <h2 id="homeTitle" class="section-title">今天记什么</h2>
          <div class="entry-actions">
            <button class="entry-button expense" type="button" data-open-form="expense">
              <span>支出</span>
              <strong id="todayExpenseQuick">¥0.00</strong>
            </button>
            <button class="entry-button income" type="button" data-open-form="income">
              <span>收入</span>
              <strong id="todayIncomeQuick">¥0.00</strong>
            </button>
          </div>

          <section class="note-panel">
            <div class="panel-head">
              <h2>最近记录</h2>
              <button class="text-button" type="button" data-nav="records">查看全部</button>
            </div>
            <div class="record-list compact" id="recentList"></div>
          </section>
        </section>

        <section class="view" id="formView" aria-labelledby="formTitle">
          <button class="back-button" type="button" data-nav="home">‹ 返回</button>
          <h2 id="formTitle" class="section-title">记一笔</h2>
          <form id="recordForm" class="record-form">
            <input type="hidden" id="recordId" />
            <input type="hidden" id="recordType" />

            <label>
              <span>日期时间</span>
              <input id="recordDateTime" type="datetime-local" required />
            </label>

            <fieldset>
              <legend>分类</legend>
              <div class="category-grid" id="categoryGrid"></div>
            </fieldset>

            <label>
              <span>名称</span>
              <input id="recordName" type="text" placeholder="例如 午饭、地铁、工资" autocomplete="off" required />
            </label>

            <label>
              <span>金额</span>
              <input id="recordAmount" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="0.00" required />
            </label>

            <button class="primary-button" type="submit">保存</button>
          </form>
        </section>

        <section class="view" id="statsView" aria-labelledby="statsTitle">
          <h2 id="statsTitle" class="section-title">统计</h2>
          <div class="balance-card">
            <span>当前余额</span>
            <strong id="balanceValue">¥0.00</strong>
          </div>
          <div class="stats-grid">
            <div><span>总收入</span><strong id="totalIncome">¥0.00</strong></div>
            <div><span>总支出</span><strong id="totalExpense">¥0.00</strong></div>
            <div><span>本月收入</span><strong id="monthIncome">¥0.00</strong></div>
            <div><span>本月支出</span><strong id="monthExpense">¥0.00</strong></div>
            <div><span>今日收入</span><strong id="todayIncome">¥0.00</strong></div>
            <div><span>今日支出</span><strong id="todayExpense">¥0.00</strong></div>
          </div>

          <section class="chart-section">
            <div class="chart-head">
              <h3>支出分类</h3>
              <div class="segment-control" id="piePeriodControl" aria-label="支出分类周期">
                <button class="is-selected" type="button" data-pie-period="day">日</button>
                <button type="button" data-pie-period="week">周</button>
                <button type="button" data-pie-period="month">月</button>
                <button type="button" data-pie-period="year">年</button>
              </div>
            </div>
            <p class="chart-note" id="pieRangeLabel"></p>
            <canvas id="pieChart" width="320" height="220"></canvas>
            <div class="legend" id="pieLegend"></div>
            <div class="category-detail" id="pieDetail">点一下颜色，看这个分类花了多少钱。</div>
          </section>

          <section class="chart-section">
            <h3>最近 7 天支出</h3>
            <canvas id="trendChart" width="320" height="220"></canvas>
          </section>
        </section>

        <section class="view" id="recordsView" aria-labelledby="recordsTitle">
          <div class="records-head">
            <h2 id="recordsTitle" class="section-title">记录</h2>
            <input id="monthFilter" type="month" aria-label="选择月份" />
          </div>
          <div class="filter-panel">
            <input id="searchInput" type="search" placeholder="搜索名称或分类" autocomplete="off" />
            <select id="categoryFilter" aria-label="按分类查看">
              <option value="">全部分类</option>
            </select>
          </div>
          <div class="record-list" id="recordList"></div>
        </section>

        <section class="view" id="backupView" aria-labelledby="backupTitle">
          <h2 id="backupTitle" class="section-title">备份</h2>
          <div class="backup-actions">
            <button class="secondary-button" id="exportJsonFullButton" type="button">导出 JSON</button>
            <button class="secondary-button" id="exportCsvButton" type="button">导出 CSV</button>
            <label class="file-button">
              导入 JSON
              <input id="importJsonInput" type="file" accept="application/json,.json" />
            </label>
          </div>
          <p class="quiet-text" id="backupStatus">数据只保存在本机浏览器。导入前会合并同 ID 记录。</p>
        </section>
      </main>

      <nav class="tabbar" aria-label="底部导航">
        <button class="tab is-active" type="button" data-nav="home">首页</button>
        <button class="tab" type="button" data-nav="stats">统计</button>
        <button class="tab" type="button" data-nav="records">记录</button>
        <button class="tab" type="button" data-nav="backup">备份</button>
      </nav>
    </div>

    <dialog id="confirmDialog">
      <form method="dialog">
        <p id="confirmText">确定删除这条记录吗？</p>
        <div class="dialog-actions">
          <button value="cancel" type="submit">取消</button>
          <button value="confirm" class="danger-button" type="submit">删除</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js" defer></script>
  </body>
</html>
